services:

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi

    container_name: uber_fastapi

    ports:
      - "8000:8000"

    environment:
      API_BASE_URL: http://fastapi:8000

    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit

    container_name: uber_streamlit

    ports:
      - "8501:8501"

    environment:
      API_BASE_URL: http://fastapi:8000

    depends_on:
      - fastapi

    restart: unless-stopped